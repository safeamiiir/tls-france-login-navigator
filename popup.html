<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLS France Navigator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>TLS France Navigator</h1>
        <p class="info">Navigates you to France TLS booking appointment slots (UK/London)</p>
        
        <button id="masterButton" class="btn btn-primary btn-large">Book an appointment</button>

        <div class="refresh-config">
            <span class="refresh-label">Random refresh picks one of these:</span>
            <div class="interval-pool" id="intervalPool">
                <button type="button" class="chip" data-value="1">1</button>
                <button type="button" class="chip selected" data-value="2">2</button>
                <button type="button" class="chip selected" data-value="3">3</button>
                <button type="button" class="chip selected" data-value="4">4</button>
                <button type="button" class="chip selected" data-value="5">5</button>
                <button type="button" class="chip selected" data-value="6">6</button>
                <button type="button" class="chip" data-value="7">7</button>
                <button type="button" class="chip" data-value="8">8</button>
                <button type="button" class="chip" data-value="9">9</button>
                <button type="button" class="chip" data-value="10">10</button>
            </div>
        </div>
        <button id="refreshToggleButton" class="btn btn-secondary">Start random refresh</button>
        <p id="refreshCountdown" class="countdown">Random refresh: Off</p>

        <div id="status" class="status">
            <div class="status-row">
                <span id="workIndicator" class="indicator idle"></span>
                <p id="statusText">Ready to start</p>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
